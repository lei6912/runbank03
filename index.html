<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5421 Enjoy組團結日 #03 熱量大罷工</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="hero">
      <div class="badge-row">
        <span class="badge">難易度 ★★★</span>
        <span class="divider">|</span>
        <span class="badge">5.1 熱量大罷工</span>
      </div>
      <h1 class="title">5421 Enjoy組團結日<br><span class="accent">#03</span></h1>
      <p class="subtitle">熱量大罷工</p>
    </header>

    <!-- Progress Card -->
    <section class="progress-card">
      <div class="progress-header">
        <div class="thermo-icon">🌡️</div>
        <div class="progress-info">
          <span class="progress-label" id="progressLabel">目標消耗進度</span>
          <span class="progress-value"><span id="totalKcal">0</span> <small>/ 5000 kcal</small></span>
        </div>
      </div>
      <p class="progress-sublabel" id="progressSublabel">實際罷工能量</p>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar">
          <span class="fire-icon">🔥</span>
        </div>
      </div>
      <div class="success-msg" id="successMsg">🏆 預計可以大成功！</div>
    </section>

    <!-- Tab Switch -->
    <div class="tab-wrap">
      <button class="tab active" id="tabRegister" onclick="switchTab('register')">活動報名</button>
      <button class="tab" id="tabReport" onclick="switchTab('report')">里程回報</button>
    </div>

    <!-- Registration Form -->
    <section class="form-card" id="formRegister">
      <div class="form-row-header">
        <label>姓名 *</label>
        <span class="slots-left" id="slotsLeft">剩 — 位組員</span>
      </div>
      <select id="registerName" class="select-input">
        <option value="">請選取組員...</option>
      </select>
      <label class="form-label">預計報名里程 (K) *</label>
      <input type="number" id="registerKm" class="text-input" placeholder="請輸入里程" step="0.01" min="0" />
      <button class="submit-btn" id="submitRegister" onclick="submitRegister()">確認送出報名</button>
    </section>

    <!-- Report Form -->
    <section class="form-card" id="formReport" style="display:none">
      <!-- 🔒 鎖定 Banner（5/1 前顯示） -->
      <div class="lock-banner" id="reportLockBanner">
        <div class="lock-icon">🔒</div>
        <div class="lock-text">
          <strong>里程回報尚未開放</strong>
          <span>請於 5/1 活動當天再回填里程數</span>
        </div>
      </div>
      <!-- 表單內容（5/1 後顯示） -->
      <div id="reportFormInner">
        <div class="form-row-header">
          <label>姓名 *</label>
          <span class="slots-left" id="reportSlotsLeft">剩 — 位組員</span>
        </div>
        <select id="reportName" class="select-input">
          <option value="">請選取組員...</option>
        </select>
        <label class="form-label">實際完成里程 (K) *</label>
        <input type="number" id="reportKm" class="text-input" placeholder="例如：5.00" step="0.01" min="0" />
        <button class="submit-btn report-btn" onclick="submitReport()">確認送出里程</button>
      </div>
    </section>

    <!-- Brand Footer -->
    <div class="brand-badge">
      <div class="brand-left">
        <div class="brand-sub">RUNNING BANK</div>
        <div class="brand-name">BOGOTO BANK</div>
      </div>
      <div class="brand-num">03</div>
      <div class="brand-right">
        <div class="brand-sub">ENJOY 組</div>
        <div class="brand-tag">16TH 團結日</div>
      </div>
    </div>

    <!-- Member List -->
    <section class="members-section">
      <div class="members-list" id="membersList"></div>
    </section>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal" style="display:none" onclick="closeModal(event)">
      <div class="modal-box">
        <h3 class="modal-title">編輯里程</h3>
        <p id="editName" class="modal-member"></p>
        <label class="form-label">實際完成里程 (K)</label>
        <input type="number" id="editKm" class="text-input" step="0.01" min="0" />
        <div class="modal-btns">
          <button class="cancel-btn" onclick="closeModal()">取消</button>
          <button class="submit-btn" onclick="saveEdit()">儲存</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
